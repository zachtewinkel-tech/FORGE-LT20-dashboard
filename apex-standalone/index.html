// ─── MATH ─────────────────────────────────────────────────────────────────────
function erfApprox(x) {
  const t = 1/(1+0.3275911*Math.abs(x));
  const y = 1-(((((1.061405429*t-1.453152027)*t)+1.421413741)*t-0.284496736)*t+0.254829592)*t*Math.exp(-x*x);
  return x>=0?y:-y;
}
const normCDF = x => 0.5*(1+erfApprox(x/Math.sqrt(2)));
function bsCall(S,K,T,iv,r=0.05){
  if(T<=0||iv<=0) return Math.max(0,S-K);
  const d1=(Math.log(S/K)+(r+.5*iv*iv)*T)/(iv*Math.sqrt(T));
  return S*normCDF(d1)-K*Math.exp(-r*T)*normCDF(d1-iv*Math.sqrt(T));
}
function bsDelta(S,K,T,iv,r=0.05){
  if(T<=0||iv<=0) return 0.5;
  const d1=(Math.log(S/K)+(r+.5*iv*iv)*T)/(iv*Math.sqrt(T));
  return normCDF(d1);
}
function strikeForDelta(S,T,iv,tgt=0.25){
  let lo=S*0.78,hi=S*1.22;
  for(let i=0;i<60;i++){const m=(lo+hi)/2; bsDelta(S,m,T,iv)>tgt?lo=m:hi=m;}
  return Math.round((lo+hi)/2*4)/4;
}
function applyVixAdj(delta,vix){
  if(vix<16) return Math.min(delta+0.05,0.40);
  if(vix>25) return Math.max(delta-0.05,0.10);
  return delta;
}
function getRegime(spy,ma50,ma200){
  if(spy>=ma50&&spy>=ma200) return 3;
  if(spy>=ma50) return 2;
  if(spy>=ma200) return 1;
  return 0;
}
function calcTrend(spy,ma50,ma200,r5,r20,ma50s,ma200s){
  let s=0;
  if(spy>=ma200) s+=0.30; if(ma200s>0) s+=0.15; if(ma50s>0) s+=0.15;
  if(ma200>0&&(spy-ma200)/ma200>0.05) s+=0.10;
  if(r20>0.05) s+=0.15; if(r5>0.02) s+=0.10;
  if(spy>ma50&&r5>0) s+=0.05;
  return Math.min(s,1.0);
}
function owFromScore(ts){ return ts>0.70?0.25:ts>0.50?0.50:1.00; }
function sma(arr,n){ return arr.length<n?null:arr.slice(-n).reduce((a,b)=>a+b,0)/n; }
function checkBlackout(date=new Date()){
  const y=date.getFullYear(),m=date.getMonth(),days=new Date(y,m+1,0).getDate();
  let wc=0,fc=0,fd=null,cd=null;
  for(let d=1;d<=days;d++){
    const dw=new Date(y,m,d).getDay();
    if(dw===3&&++wc===2) fd=d; if(dw===5&&++fc===2) cd=d;
  }
  const td=date.getDate();
  return{active:(fd&&td>=fd-3&&td<fd)||(cd&&td>=cd-3&&td<cd),
    fomc:!!(fd&&td>=fd-3&&td<fd),cpi:!!(cd&&td>=cd-3&&td<cd),fomcDay:fd,cpiDay:cd};
}
function nextFriday(){
  const d=new Date(),diff=(5-d.getDay()+7)%7||7;
  d.setDate(d.getDate()+diff);
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
}
function nextFridayDate(){
  const d=new Date(),diff=(5-d.getDay()+7)%7||7;
  d.setDate(d.getDate()+diff);
  return d.toISOString().split("T")[0];
}

      <input type={type} value={value} step={step} readOnly={readOnly}

function LineChart({apex,spy,h=220}){
  const W=640,PL=52,PR=70,PT=18,PB=28;
  const IW=W-PL-PR,IH=h-PT-PB,n=apex.length;
  const logMin=Math.log10(9500),logMax=Math.log10(400000);
  const cx=i=>PL+(i/(n-1))*IW;
  const cy=v=>PT+IH-((Math.log10(Math.max(v,1))-logMin)/(logMax-logMin))*IH;
  const line=data=>data.map((d,i)=>`${i===0?"M":"L"}${cx(i).toFixed(1)},${cy(d.v).toFixed(1)}`).join(" ");
  const area=data=>line(data)+` L${cx(n-1)},${PT+IH} L${PL},${PT+IH} Z`;
  const yTicks=[10000,20000,50000,100000,200000,330000];
  const xYears=[2000,2005,2010,2015,2020,2026];
  const apexFinal=apex.at(-1).v,spyFinal=spy.at(-1).v;
  return(
    <svg viewBox={`0 0 ${W} ${h}`} style={{width:"100%",height:h,overflow:"visible"}}>
      <defs>
        <linearGradient id="agr" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={C.apex} stopOpacity="0.15"/>
          <stop offset="100%" stopColor={C.apex} stopOpacity="0"/>
        </linearGradient>
        <linearGradient id="sgr" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={C.spy} stopOpacity="0.08"/>
          <stop offset="100%" stopColor={C.spy} stopOpacity="0"/>
        </linearGradient>
        <clipPath id="lcc"><rect x={PL} y={PT} width={IW} height={IH}/></clipPath>
      </defs>
      {yTicks.map(v=>(
        <g key={v}>
          <line x1={PL} y1={cy(v)} x2={PL+IW} y2={cy(v)}
            stroke={v===10000?"#cbd5e1":"#e2e8f0"} strokeWidth={v===10000?"1":"0.6"}/>
          <text x={PL-5} y={cy(v)+3} textAnchor="end" fontSize="8" fill={C.faint}
            fontFamily="Inter,system-ui,sans-serif">
            {v>=100000?`$${v/1000}K`:`$${(v/1000).toFixed(0)}K`}
          </text>
        </g>
      ))}
      {xYears.map(yr=>{
        const idx=apex.findIndex(d=>d.yr===yr);
        if(idx<0) return null;
        return(<g key={yr}>
          <line x1={cx(idx)} y1={PT} x2={cx(idx)} y2={PT+IH}
            stroke={C.border} strokeWidth="0.5" strokeDasharray="3 3"/>
        </g>);
      })}
      <line x1={PL} y1={PT+IH} x2={PL+IW} y2={PT+IH} stroke={C.border} strokeWidth="1.5"/>
      <line x1={PL} y1={PT} x2={PL} y2={PT+IH} stroke={C.border} strokeWidth="1"/>
      <g clipPath="url(#lcc)">
        <path d={area(spy)} fill="url(#sgr)"/>
        <path d={area(apex)} fill="url(#agr)"/>
      </g>
      <path d={line(spy)} fill="none" stroke={C.spy} strokeWidth="1.8" strokeDasharray="6 3" opacity="0.75"/>
      <path d={line(apex)} fill="none" stroke={C.apex} strokeWidth="2.5"/>
      <circle cx={cx(n-1)} cy={cy(apexFinal)} r="3.5" fill={C.apex}/>
      <text x={cx(n-1)+8} y={cy(apexFinal)+4} fontSize="9" fill={C.apex}
        fontFamily="Inter,system-ui,sans-serif" fontWeight="700">$330K</text>
      <circle cx={cx(n-1)} cy={cy(spyFinal)} r="3" fill="#2563eb" opacity="0.8"/>
      <text x={cx(n-1)+8} y={cy(spyFinal)+4} fontSize="9" fill="#2563eb"
        fontFamily="Inter,system-ui,sans-serif">$49K</text>
      <text x={PL+IW} y={PT+10} textAnchor="end" fontSize="7.5" fill={C.faint}
        fontFamily="Inter,system-ui,sans-serif" fontStyle="italic">log scale</text>
    </svg>
  );
}
function MiniBar({data,h=140}){
  const vals=data.map(d=>[d.apex,d.spy]).flat();
  const mx=Math.max(...vals.map(Math.abs),1);
  const bw=9,gap=3,gg=5,mid=h/2,W=data.length*(bw*2+gap+gg);
  const sc=v=>(Math.abs(v)/mx)*(mid-10);
  return(
    <svg viewBox={`0 0 ${W} ${h}`} style={{width:"100%",height:h,overflow:"visible"}}>
      <line x1="0" y1={mid} x2={W} y2={mid} stroke={C.border} strokeWidth="1"/>
      {data.map((d,i)=>{
        const x=i*(bw*2+gap+gg),ah=sc(d.apex),sh=sc(d.spy);
        return(
          <g key={d.yr}>
            <rect x={x} y={d.apex>=0?mid-ah:mid} width={bw} height={ah} fill={d.apex>=0?C.apex:C.danger} opacity="0.8" rx="1"/>
            <rect x={x+bw+gap} y={d.spy>=0?mid-sh:mid} width={bw} height={sh} fill={d.spy>=0?C.spy:C.warn} opacity="0.6" rx="1"/>
            {i%5===0&&<text x={x+bw} y={h-1} textAnchor="middle" fontSize="7" fill={C.faint} fontFamily="Inter,system-ui,sans-serif">{d.yr}</text>}
          </g>
        );
      })}
    </svg>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
export default function APEXApp(){
  const [tab,setTab]       = useState("brief");
  const [mkt,setMkt]       = useState(null);
  const [loading,setLoading]= useState(false);
  const [fetchErr,setFetchErr]= useState(null);
  const [lastFetch,setLastFetch]= useState(null);
  const [apiKey,setApiKey] = useState(()=>ls("apikey",""));
  // Port only stores overrides — positions are derived from trade log
  const [port,setPort] = useState(()=>ls("port",{
    marginBalance:"",  // from broker, not derivable from trades
    portfolioValueOverride:"", // optional manual override of latest nav
  }));
  const [trades,setTrades] = useState(()=>ls("trades",[]));
  const [selP,setSelP]     = useState(6);
  const [now,setNow]       = useState(new Date());
  const [showAddTrade,setShowAddTrade] = useState(false);
  const [manualMode,setManualMode] = useState(false);
  const [manualInputs,setManualInputs] = useState({spy:"",vix:"",ma50:"",ma200:""});
  const [newTrade,setNewTrade] = useState({type:"SELL_CALL",date:new Date().toISOString().split("T")[0],strike:"",expiry:"",premium:"",contracts:"",shares:"",price:"",pnl:"",nav_after:"",notes:""});

  const setP=(k,v)=>setPort(p=>{const n={...p,[k]:v};ss("port",n);return n;});
  // position helpers removed — all positions derived from trade log
  const setNT=(k,v)=>setNewTrade(p=>({...p,[k]:v}));

  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t);},[]);
  useEffect(()=>{ss("apikey",apiKey);},[apiKey]);
  useEffect(()=>{ss("trades",trades);},[trades]);

  // ── FINNHUB FETCH ─────────────────────────────────────────────────────────
  const fetchData=useCallback(async(key=apiKey)=>{
    if(!key){setFetchErr("Add your Finnhub API key in Settings to enable auto-fetch.");return;}
    setLoading(true);setFetchErr(null);
    try{
      const base="https://finnhub.io/api/v1";
      const from=Math.floor(Date.now()/1000)-310*86400;
      const to=Math.floor(Date.now()/1000);
      let spyQ,candles,vixQ;
      try{
        [spyQ,candles,vixQ]=await Promise.all([
          fetch(`${base}/quote?symbol=SPY&token=${key}`).then(r=>r.json()),
          fetch(`${base}/stock/candle?symbol=SPY&resolution=D&from=${from}&to=${to}&token=${key}`).then(r=>r.json()),
          fetch(`${base}/quote?symbol=VIX&token=${key}`).then(r=>r.json()),
        ]);
      }catch(netErr){
        // Network blocked (sandbox environment) — switch to manual mode
        throw new Error("SANDBOX_BLOCKED");
      }
      if(candles?.error||spyQ?.error) throw new Error(`Finnhub: ${candles?.error||spyQ?.error}`);
      if(candles.s!=="ok"||!candles.c?.length) throw new Error("Candle data unavailable. Verify your API key at finnhub.io and try again.");
      const closes=candles.c;
      const spy=spyQ.c||closes.at(-1);
      const vix=vixQ.c||18;
      const ma50=sma(closes,50);
      const ma200=sma(closes,200);
      const ma50_10=sma(closes.slice(0,-10),50);
      const ma200_20=sma(closes.slice(0,-20),200);
      const ma50s=ma50&&ma50_10?(ma50-ma50_10)/ma50_10:0;
      const ma200s=ma200&&ma200_20?(ma200-ma200_20)/ma200_20:0;
      const r5=closes.length>=6?(spy-closes.at(-6))/closes.at(-6):0;
      const r20=closes.length>=21?(spy-closes.at(-21))/closes.at(-21):0;
      setMkt({spy,vix,ma50,ma200,ma50s,ma200s,r5,r20,fetchedAt:new Date().toISOString()});
      setLastFetch(new Date());
    }catch(e){
      if(e.message==="SANDBOX_BLOCKED"){
        setFetchErr("SANDBOX");
      } else {
        setFetchErr(e.message||"Fetch failed");
      }
    }finally{setLoading(false);}
  },[apiKey]);

  useEffect(()=>{
    if(apiKey) fetchData();
    const iv=setInterval(()=>{
      const h=new Date().getHours(),dw=new Date().getDay();
      if(dw>=1&&dw<=5&&h>=9&&h<17&&apiKey) fetchData();
    },5*60*1000);
    return()=>clearInterval(iv);
  },[fetchData,apiKey]);

  // ── COMPUTE SIGNALS ───────────────────────────────────────────────────────
  const sig=useMemo(()=>{
    if(!mkt||!mkt.ma50||!mkt.ma200) return null;
    const{spy,vix,ma50,ma200,ma50s,ma200s,r5,r20}=mkt;
    const iv=vix/100*IV_MULT;
    const reg=getRegime(spy,ma50,ma200);
    const lev=REGIME_LEV[reg];
    // Portfolio value: override → latest nav_after in trades → default
    const latestNav=(()=>{
      const pts=[...trades].filter(t=>t.nav_after&&parseFloat(t.nav_after)>0)
        .sort((a,b)=>b.date.localeCompare(a.date));
      return pts.length>0?parseFloat(pts[0].nav_after):NAV0;
    })();
    const nav=parseFloat(port.portfolioValueOverride)||latestNav;
    const notional=nav*lev;
    const tgtShares=Math.floor(notional/spy);
    const maxContracts=Math.floor(tgtShares/100);
    const baseDelta=REGIME_DELTA[reg];
    const adjDelta=applyVixAdj(baseDelta,vix);
    const ts=calcTrend(spy,ma50,ma200,r5,r20,ma50s,ma200s);
    const ow=owFromScore(ts);
    const contracts=Math.floor(maxContracts*ow);
    const T=CALL_DTE/365;
    const strike=strikeForDelta(spy,T,iv,adjDelta);
    const prem=bsCall(spy,strike,T,iv);
    const annYield=(prem/spy)*(365/CALL_DTE)*100;
    const totalPrem=prem*contracts*100;
    const bo=checkBlackout();
    const marginB=Math.max(0,notional-nav);
    const idle=Math.max(0,nav-notional);
    const curShares=parseInt(port.shares)||0;
    const curLev=nav>0?(curShares*spy)/nav:0;
    const levDrift=curLev-lev;
    const sharesDelta=tgtShares-curShares;
    // Aggregate all open calls for P&L and roll
    const activeCalls=(port.calls||[]).filter(c=>parseFloat(c.strike)>0&&parseFloat(c.premium)>0&&parseInt(c.contracts)>0);
    let callPnL=null,roll=null,callVal=null;
    let totalCallPnL=0,anyRollTrigger=false,rollPct=0;
    const callDetails=activeCalls.map(c=>{
      const oStrike=parseFloat(c.strike),oPrem=parseFloat(c.premium),oCon=parseInt(c.contracts)||0;
      const Tr=c.expiry?Math.max((new Date(c.expiry)-new Date())/(365*86400000),0.001):3/365;
      const cv=bsCall(spy,oStrike,Tr,iv);
      const pct=oPrem>0?(oPrem-cv)/oPrem:0;
      const pnl=(oPrem-cv)*oCon*100;
      totalCallPnL+=pnl;
      if(pct>=0.70) anyRollTrigger=true;
      rollPct=Math.max(rollPct,pct);
      return{...c,callVal:cv,pnl,pct};
    });
    if(activeCalls.length>0){
      callVal=callDetails[0]?.callVal;
      roll={pct:rollPct,trigger:anyRollTrigger,val:callVal};
      callPnL=totalCallPnL;
    }
    // For backward compat with action items (uses first call)
    const firstCall=port.calls?.[0]||{};
    return{reg,lev,nav,notional,tgtShares,maxContracts,adjDelta,baseDelta,ts,ow,contracts,
      strike,prem,annYield,totalPrem,bo,iv,vix,marginB,idle,
      dailyM:marginB*MARGIN_RATE/252,dailyT:idle*TBILL_RATE/252,
      curShares,curLev,levDrift,sharesDelta,callPnL,roll,callVal,spy,ma50,ma200};
  },[mkt,port]);

  // ── ACTION ITEMS ──────────────────────────────────────────────────────────
  const actions=useMemo(()=>{
    if(!sig) return null;
    const items=[];
    if(sig.bo.active){
      items.push({priority:"high",type:"BLACKOUT",icon:"⛔",color:C.warn,
        title:"Blackout — No new calls",
        desc:`${sig.bo.fomc?`FOMC on the ${sig.bo.fomcDay}th.`:""}${sig.bo.cpi?` CPI on the ${sig.bo.cpiDay}th.`:""} Do not sell calls. Hold all positions. Resume Monday after the event.`,
        action:null});
    }
    if(sig.roll?.trigger){
      items.push({priority:"high",type:"ROLL",icon:"⚡",color:C.purple,
        title:`Roll open call — ${(sig.roll.pct*100).toFixed(0)}% captured`,
        desc:`Buy back ${firstCall.contracts}× SPY $${firstCall.strike}C at market open (~$${sig.roll.val.toFixed(2)}/sh). Then sell new call per item below.`,
        action:{label:`Buy back ${port.call_contracts}× $${port.call_strike}C`,detail:`Cost ~$${(sig.roll.val*(parseInt(firstCall.contracts)||0)*100).toFixed(0)}`}});
    }
    if(Math.abs(sig.levDrift)>0.03&&sig.curShares>0){
      const buy=sig.sharesDelta>0;
      items.push({priority:Math.abs(sig.levDrift)>0.1?"high":"medium",type:"REBALANCE",icon:"⚖",color:buy?C.apex:C.warn,
        title:`${buy?"Buy":"Sell"} ${Math.abs(sig.sharesDelta).toLocaleString()} SPY shares`,
        desc:`Current leverage ${sig.curLev.toFixed(2)}x vs target ${sig.lev}x (drift ${sig.levDrift>=0?"+":""}${sig.levDrift.toFixed(2)}x). ${buy?"Buy":"Sell"} ${Math.abs(sig.sharesDelta)} shares at market open.`,
        action:{label:`${buy?"BUY":"SELL"} ${Math.abs(sig.sharesDelta)} SPY`,detail:`~${fmt$(Math.abs(sig.sharesDelta)*sig.spy)} total`}});
    }
    if(!sig.bo.active){
      const hasOpenCall=(port.calls||[]).some(c=>parseFloat(c.strike)>0&&c.expiry&&new Date(c.expiry)>new Date());
      if(!hasOpenCall||sig.roll?.trigger){
        items.push({priority:"medium",type:"SELL_CALL",icon:"📝",color:C.info,
          title:`Sell ${sig.contracts} contracts · SPY $${sig.strike.toFixed(2)}C`,
          desc:`${nextFriday()} expiry · Δ${sig.adjDelta.toFixed(2)}${sig.adjDelta!==sig.baseDelta?` (VIX-adj from Δ${sig.baseDelta.toFixed(2)})`:""} · ${(sig.ow*100).toFixed(0)}% overwrite · ~$${(sig.prem*100).toFixed(0)}/contract · Total ~$${sig.totalPrem.toLocaleString("en-US",{maximumFractionDigits:0})} premium`,
          action:{label:`SELL ${sig.contracts}× SPY $${sig.strike.toFixed(2)}C`,detail:`exp ${nextFriday()} · ~$${sig.totalPrem.toLocaleString("en-US",{maximumFractionDigits:0})} total`}});
      }
    }
    return items;
  },[sig,port]);

  // ── TIME-WEIGHTED RETURN — correctly handles deposits & withdrawals ──────
  const twr=useMemo(()=>{
    // Every trade with nav_after is a sub-period boundary
    // Deposits/withdrawals are EXCLUDED from return calc (that's the point of TWR)
    // but they DO create a new sub-period boundary
    const pts=[...trades]
      .filter(t=>t.nav_after&&parseFloat(t.nav_after)>0&&t.date)
      .sort((a,b)=>a.date.localeCompare(b.date))
      .map(t=>({
        date:t.date,
        val:parseFloat(t.nav_after),
        isCashFlow:t.type==="DEPOSIT"||t.type==="WITHDRAWAL",
        amount:t.type==="DEPOSIT"?parseFloat(t.amount||0):
               t.type==="WITHDRAWAL"?-parseFloat(t.amount||0):0,
      }));
    if(pts.length<2) return null;
    // TWR: chain sub-period returns, adjusting for cash flows
    // For each period: HPR = (EndValue - CashFlow) / StartValue
    // CashFlow at period end = deposit added or withdrawal taken
    let twrProduct=1;
    for(let i=1;i<pts.length;i++){
      const startVal=pts[i-1].val;
      if(startVal<=0) continue;
      // If this boundary is a cash flow, the return for this sub-period
      // should exclude the cash flow itself
      const cashFlow=pts[i].isCashFlow?pts[i].amount:0;
      const endValExCashFlow=pts[i].val-cashFlow;
      const hpr=endValExCashFlow/startVal;
      if(hpr>0) twrProduct*=hpr;
    }
    const firstDate=new Date(pts[0].date+"T12:00:00");
    const years=(Date.now()-firstDate.getTime())/(365.25*24*3600*1000);
    if(years<0.01) return null;
    const annualized=(Math.pow(twrProduct,1/years)-1)*100;
    const totalReturn=(twrProduct-1)*100;
    // Net cash flows (deposits - withdrawals)
    const netCashFlows=pts.filter(p=>p.isCashFlow).reduce((s,p)=>s+p.amount,0);
    return{
      annualized, totalReturn, years,
      startVal:pts[0].val, currentVal:pts.at(-1).val,
      periods:pts.length, firstDate:pts[0].date,
      netCashFlows, deposits:pts.filter(p=>p.amount>0).length,
      withdrawals:pts.filter(p=>p.amount<0).length,
    };
  },[trades]);

  const isOpen=now.getDay()>=1&&now.getDay()<=5&&(now.getHours()>9||(now.getHours()===9&&now.getMinutes()>=30))&&now.getHours()<16;

  );

  // ─── RENDER ───────────────────────────────────────────────────────────────
  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:F.mono}}>

      {/* TOP BAR */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,
        padding:"0 24px",display:"flex",alignItems:"center",
        justifyContent:"space-between",height:64,position:"sticky",top:0,zIndex:200,
        boxShadow:"0 2px 8px rgba(90,70,40,0.12)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:44,height:44,borderRadius:10,overflow:"hidden",
            background:"transparent",flexShrink:0}}>
            <img src={APEX_LOGO} alt="APEX" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
          </div>
          <div>

            <div style={{fontSize:8,color:C.faint,letterSpacing:3}}>DYNAMIC SPY STRATEGY</div>
          </div>
          {sig&&(
            <div style={{marginLeft:6,background:REGIME_BG[rc],border:`1px solid ${rBorder}`,
              borderRadius:20,padding:"4px 12px",fontSize:11,fontWeight:600,

          )}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          {mkt&&(
            <div style={{display:"flex",gap:18}}>
              {[
                {l:"SPY",  v:`$${mkt.spy.toFixed(2)}`,   c:C.apex},
                {l:"VIX",  v:mkt.vix.toFixed(1),          c:mkt.vix>25?C.danger:mkt.vix<16?C.apex:C.text},
                {l:"MA50", v:`$${mkt.ma50?.toFixed(2)}`,  c:mkt.spy>=(mkt.ma50||0)?C.apex:C.danger},
                {l:"MA200",v:`$${mkt.ma200?.toFixed(2)}`, c:mkt.spy>=(mkt.ma200||0)?C.apex:C.danger},
              ].map(({l,v,c})=>(
                <div key={l} style={{textAlign:"right"}}>
                  <div style={{fontSize:8,color:C.faint,letterSpacing:2}}>{l}</div>
                  <div style={{fontFamily:F.mono,fontSize:12,fontWeight:500,color:c}}>{v}</div>

        {/* ══════════════════════ TRADE LOG */}
        {tab==="tradelog"&&(

                  {type:"DEPOSIT",     label:"+ Deposit",    color:"#1e4d7a"},

                    {label}
                  </button>
                ))}
                <button onClick={()=>{
                  setNewTrade({type:"SELL_CALL",date:new Date().toISOString().split("T")[0],

                    amount:"",pnl:"",nav_after:"",notes:""});

                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:12}}>

                  const color=COLORS[t.type]||C.muted;

                    <div key={t.id} style={{background:C.surface,
                      border:`1px solid ${isCashFlow?color+"30":C.border}`,

                      <div style={{minWidth:90,flexShrink:0}}>

                        {isCashFlow&&(
                          <div style={{fontFamily:"Georgia,serif",fontSize:13,fontWeight:700,color,marginBottom:2}}>

                            {t.amount&&<span style={{fontSize:12,fontWeight:400,color:C.muted,marginLeft:8,fontFamily:F.mono}}>
                              ${parseFloat(t.amount).toLocaleString("en-US",{maximumFractionDigits:0})}
                            </span>}
                          </div>
                        )}
                        {["SELL_CALL","BUY_CALL","ROLL"].includes(t.type)&&t.strike&&(
                          <div style={{fontFamily:"Georgia,serif",fontSize:13,fontWeight:600,color:C.text,marginBottom:2}}>
                            {t.contracts}× SPY ${t.strike}C
                            {t.expiry&&<span style={{color:C.purple}}> exp {fmtDate(t.expiry)}</span>}
                            {t.premium&&<span style={{color:C.muted,fontSize:11,fontWeight:400,fontFamily:F.mono}}> @ ${t.premium}/sh</span>}

                            </div>

                        {t.nav_after&&(

                            <div style={{fontSize:8,color:C.faint,letterSpacing:1.5,fontFamily:F.mono,marginBottom:2}}>PORT. VALUE</div>
                            <div style={{fontFamily:"Georgia,serif",fontSize:13,fontWeight:600,color:C.text}}>
                              ${parseFloat(t.nav_after).toLocaleString("en-US",{maximumFractionDigits:0})}
                            </div>

                        <button onClick={()=>deleteTrade(t.id)}
                          style={{background:"none",border:"none",cursor:"pointer",
                            color:C.border,fontSize:16,padding:"4px"}} title="Delete">✕</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ══════════════════════ PERFORMANCE — MORNINGSTAR STYLE */}
        {/* ══════════════════════ LIVE PERFORMANCE */}
        {tab==="performance"&&(()=>{
          // ── derive all live metrics from trade log ──────────────────────────
          const tradesSorted=[...trades].sort((a,b)=>a.date.localeCompare(b.date));
          const navPoints=tradesSorted.filter(t=>t.nav_after&&parseFloat(t.nav_after)>0&&t.date)
            .map(t=>({date:t.date,val:parseFloat(t.nav_after)}));
          const currentNav=parseFloat(port.portfolioValue)||0;
          if(navPoints.length>0&&currentNav>0){
            const last=navPoints.at(-1);
            if(new Date().toISOString().split("T")[0]>last.date)
              navPoints.push({date:new Date().toISOString().split("T")[0],val:currentNav});
          }

          // Call trades for premium/win-rate stats
          const callTrades=tradesSorted.filter(t=>t.type==="SELL_CALL"||t.type==="BUY_CALL"||t.type==="ROLL");
          const sellCalls=tradesSorted.filter(t=>t.type==="SELL_CALL");
          const buyCalls =tradesSorted.filter(t=>t.type==="BUY_CALL"||t.type==="ROLL");
          const totalPremium=sellCalls.reduce((s,t)=>{
            const p=parseFloat(t.premium)||0,c=parseInt(t.contracts)||0;
            return s+p*c*100;
          },0);
          const closedPnl=tradesSorted.reduce((s,t)=>s+(parseFloat(t.pnl)||0),0);

          // Win rate: closed calls where pnl >= 0

                            :(t.type==="BUY_SHARES"||t.type==="SELL_SHARES")&&t.shares

                                <span style={{background:tc+"18",border:`1px solid ${tc}40`,

                                  {t.type.replace(/_/g," ")}
                                </span>

                                  <span style={{fontFamily:"Georgia,serif",fontWeight:600,
                                    color:pnl>=0?C.apex:C.danger}}>

                                  </span>

                              <td style={{padding:"9px 14px",textAlign:"right",color:C.muted,fontSize:11}}>
                                {t.nav_after?`$${parseFloat(t.nav_after).toLocaleString("en-US",{maximumFractionDigits:0})}`:"—"}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </Card>

              </div>
            )}
          </div>
          );
        })()}

        {tab==="fundprofile"&&(()=>{
          const WP={
            serif:"'Lora',Georgia,serif", sans:"'Inter',-apple-system,sans-serif",

            {label:"10Y", apexS:0.768,spyS:0.444,apexDD:-28.1,spyDD:-34.6,apex10k:63185, spy10k:33337},

          const sgn=(v,d=2)=>(v>=0?"+":"")+v.toFixed(d);
          const sc=v=>v>=0?WP.green:WP.neg;
          const WSection=({title,children})=>(

                        d:"Weekly 7-DTE covered calls. Delta 0.15–0.30 adjusted ±0.05 by VIX. 70% profit roll trigger."},
                    ].map(({n,t,c,bg,d})=>(
                      <div key={n} style={{background:bg,borderTop:`3px solid ${c}`,
                        borderRadius:2,padding:"12px 14px"}}>
                        <div style={{fontSize:8,color:c,letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>{n}</div>
                        <div style={{fontFamily:WP.serif,fontSize:12,fontWeight:700,color:"#1a1a1a",marginBottom:6}}>{t}</div>
                        <div style={{fontSize:10,color:WP.muted,lineHeight:1.7}}>{d}</div>
                      </div>
                    ))}
                  </div>
                </WSection>

                {/* ── REGIME FRAMEWORK ── */}
                <WSection title="Regime Classification Framework">
                  <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch",marginBottom:10}}>
                    <table style={{width:"100%",minWidth:560,borderCollapse:"collapse",fontSize:11,fontFamily:WP.sans}}>
                      <thead>
                        <tr style={{background:WP.bg,borderBottom:`2px solid ${WP.border}`}}>
                          {["Regime","Condition","Leverage","Base Δ","VIX < 16","VIX > 25","Overwrite"].map((h,i)=>(
                            <th key={h} style={{padding:"8px 12px",textAlign:i===0?"left":"center",
                              fontSize:10,color:WP.faint,fontWeight:600,whiteSpace:"nowrap"}}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {[
                          {r:"R0 — BEAR",  cond:"Below MA50 & MA200",     lev:"0.50x",bg:"#fff1f1",bc:"#fca5a5",tc:"#991b1b",d:"Δ0.15",vlo:"Δ0.20",vhi:"Δ0.10",ow:"100%"},
                          {r:"R1 — WEAK",  cond:"Below MA50, above MA200", lev:"1.25x",bg:"#fff7ed",bc:"#fdba74",tc:"#92400e",d:"Δ0.20",vlo:"Δ0.25",vhi:"Δ0.15",ow:"25–100%"},
                          {r:"R2 — MIXED", cond:"Above MA50, below MA200", lev:"1.25x",bg:"#fefce8",bc:"#fde047",tc:"#854d0e",d:"Δ0.25",vlo:"Δ0.30",vhi:"Δ0.20",ow:"25–100%"},
                          {r:"R3 — STRONG",cond:"Above MA50 & MA200",      lev:"1.75x",bg:"#f0fdf4",bc:"#86efac",tc:"#14532d",d:"Δ0.30",vlo:"Δ0.35",vhi:"Δ0.25",ow:"25–100%"},
                        ].map(({r,cond,lev,bg,bc,tc,d,vlo,vhi,ow})=>(
                          <tr key={r} style={{borderBottom:`1px solid ${WP.borderL}`,background:bg}}>
                            <td style={{padding:"9px 12px"}}>
                              <span style={{background:bg,border:`1px solid ${bc}`,color:tc,
                                borderRadius:2,padding:"2px 8px",fontSize:10,fontWeight:600,
                                whiteSpace:"nowrap"}}>{r}</span>
                            </td>
                            <td style={{padding:"9px 12px",textAlign:"center",fontSize:10,color:WP.muted}}>{cond}</td>
                            <td style={{padding:"9px 12px",textAlign:"center",fontFamily:WP.serif,fontWeight:700,color:tc,fontSize:12}}>{lev}</td>
                            <td style={{padding:"9px 12px",textAlign:"center",fontSize:11}}>{d}</td>
                            <td style={{padding:"9px 12px",textAlign:"center",fontSize:11,color:WP.green}}>{vlo}</td>
                            <td style={{padding:"9px 12px",textAlign:"center",fontSize:11,color:WP.warn}}>{vhi}</td>
                            <td style={{padding:"9px 12px",textAlign:"center",fontSize:10,color:WP.muted}}>{ow}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  <div style={{background:WP.greenL,border:`1px solid ${WP.green}30`,
                    borderRadius:3,padding:"10px 14px",fontSize:11,color:WP.muted,lineHeight:1.7}}>
                    <strong style={{color:WP.green}}>Trend Suppression:</strong> Score &gt;0.70 → 25% OW · 0.50–0.70 → 50% OW · &lt;0.50 → 100% OW.{" "}
                    <strong style={{color:WP.green}}>Blackout Rule:</strong> No new calls in the 3 calendar days preceding the 2nd Wednesday (FOMC) or 2nd Friday (CPI) each month.
                  </div>
                </WSection>

                {/* ── CALL PROGRAM ── */}
                <WSection title="Weekly Covered Call Program">
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                    <div>
                      <div style={{fontFamily:WP.serif,fontSize:12,fontWeight:700,marginBottom:8}}>Program Parameters</div>
                      <WTable
                        headers={["Parameter","Value"]}
                        rows={[
                          ["Expiry Cycle","Weekly (7 calendar DTE)"],
                          ["Execution Window","Monday 9:35–9:45 AM ET"],
                          ["Strike Method","Black-Scholes delta targeting"],
                          ["Delta Range","Δ0.10 – Δ0.40 (VIX-adjusted)"],
                          ["IV Assumption","VIX × 1.10"],
                          ["Early Roll Trigger","70% of premium captured"],
                          ["Order Type","Limit order at mid-market"],
                          ["Assignment Risk","None — roll prevents assignment"],
                        ]}
                      />
                    </div>
                    <div>
                      <div style={{fontFamily:WP.serif,fontSize:12,fontWeight:700,marginBottom:4}}>Premium by VIX Level</div>
                      <div style={{fontSize:10,color:WP.faint,marginBottom:8}}>Per $1M SPY notional · 52 cycles/year</div>
                      <WTable
                        headers={["VIX Level","Delta","Yield/yr","$/yr per $1M"]}
                        rows={[
                          ["Below 16","Δ0.25–0.35","5–8%",{v:"$50–80K",color:WP.green}],
                          ["16 to 25","Δ0.20–0.30","8–14%",{v:"$80–140K",color:WP.green,bold:true}],
                          ["Above 25","Δ0.10–0.25","14–22%",{v:"$140–220K",color:WP.green,bold:true}],
                        ]}
                      />
                      <div style={{marginTop:8,padding:"10px 12px",background:WP.greenL,
                        border:`1px solid ${WP.green}30`,borderRadius:3,fontSize:10,
                        color:WP.muted,lineHeight:1.7}}>
                        At current scale (~$32M): gross annual premium at VIX 18 ≈{" "}
                        <strong style={{color:WP.green}}>$2.6–4.5M/yr</strong>. Premium income
                        is anti-correlated with market direction.
                      </div>
                    </div>
                  </div>
                </WSection>

                {/* ── EXECUTION PROTOCOL ── */}
                <WSection title="Monday Morning Execution Protocol">
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                    {[
                      [["1","Data Pull","Pull SPY price, VIX, MA50, MA200. Auto-fetched via Finnhub API in APEX app."],
                       ["2","Regime Check","Determine R0–R3 based on SPY vs. MA50 and MA200. Confirm regime in app header."],
                       ["3","Blackout","Verify no FOMC/CPI within 3 calendar days. If active — stop. No new calls."],
                       ["4","Rebalance","If leverage deviates >3% from target: buy or sell SPY shares at market open."]],
                      [["5","Early Roll","If open call has captured ≥70% of premium, buy back and proceed to Step 6."],
                       ["6","Sell New Call","B-S delta targeting + VIX adj (±0.05Δ) + trend suppression. Limit at mid."],
                       ["7","Log Trade","Enter in APEX app Trade Log: strike, expiry, premium, contracts, NAV after."],
                       ["8","Monitor","Check roll progress daily. 70% trigger shown live in app."]]
                    ].map((col,ci)=>(
                      <div key={ci}>
                        {col.map(([n,t,d])=>(
                          <div key={n} style={{display:"flex",gap:10,marginBottom:12,alignItems:"flex-start"}}>
                            <div style={{width:20,height:20,borderRadius:"50%",background:WP.green,
                              color:"#fff",fontSize:10,fontWeight:700,display:"flex",
                              alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                              {n}
                            </div>
                            <div>
                              <div style={{fontWeight:600,fontSize:11,color:"#1a1a1a",marginBottom:2}}>{t}</div>
                              <div style={{fontSize:10,color:WP.muted,lineHeight:1.7}}>{d}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    ))}
                  </div>
                </WSection>

                {/* ── TAX & RISK ── */}
                <WSection title="Tax Considerations & Risk Factors">
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                    <div>
                      <div style={{fontFamily:WP.serif,fontSize:12,fontWeight:700,marginBottom:10}}>Tax Structure</div>
                      {[
                        ["Underlying Shares","Never sold via the strategy. All appreciation is unrealized long-term capital gain. Bear regime adjusts borrowed capital only."],
                        ["Call Premium","Short-term ordinary income. Roll mechanics create an offsetting short-term loss reducing net taxable income."],
                        ["Qualified Calls","7-DTE calls at target delta are structured to qualify under IRC §1092, preserving the holding period on underlying shares."],
                      ].map(([t,d])=>(
                        <div key={t} style={{marginBottom:10,paddingBottom:10,
                          borderBottom:`1px solid ${WP.borderL}`}}>
                          <div style={{fontWeight:600,fontSize:10,color:WP.green,marginBottom:3}}>{t}</div>
                          <div style={{fontSize:10,color:WP.muted,lineHeight:1.7}}>{d}</div>
                        </div>
                      ))}
                    </div>
                    <div>
                      <div style={{fontFamily:WP.serif,fontSize:12,fontWeight:700,marginBottom:10}}>Key Risk Factors</div>
                      {[
                        ["Leverage Risk","1.75x in R3 amplifies losses. MA50/MA200 bear rule auto-drops to 0.50x — no discretion required. VIX >25 reduces delta automatically."],
                        ["Flash Crash Risk","Fast drops before MA confirmation (2015: −9.9% vs. SPY −0.7%). VIX regime provides early warning. 3-close re-entry rule reduces false breaks."],
                        ["Trend Suppression","At 25% OW in strong trends, 75% of position is uncovered. Strong SPY rallies will outperform the strategy."],
                        ["Model Risk","All backtested options use Black-Scholes with IV = VIX × 1.10. Real spreads and bid/ask differ. ~0.1–0.2% annual drag not modeled."],
                      ].map(([t,d])=>(
                        <div key={t} style={{marginBottom:10,paddingBottom:10,
                          borderBottom:`1px solid ${WP.borderL}`}}>
                          <div style={{fontWeight:600,fontSize:10,color:WP.warn,marginBottom:3}}>{t}</div>
                          <div style={{fontSize:10,color:WP.muted,lineHeight:1.7}}>{d}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </WSection>

                {/* ── CONCLUSION ── */}
                <WSection title="Investment Conclusion">
                  <div style={{background:WP.greenL,border:`1px solid ${WP.green}40`,
                    borderRadius:3,padding:"18px 20px",marginBottom:14}}>
                    <p style={{fontFamily:WP.serif,fontSize:13,lineHeight:1.9,color:"#1a1a1a",margin:"0 0 10px"}}>
                      The APEX Dynamic SPY Strategy delivers a compelling combination of income generation,
                      drawdown management, and long-term compounding. Across 26 years and four major market
                      dislocations, the strategy produced <strong>15.05% annualized returns</strong> with a
                      Sharpe of 0.516 — while limiting maximum drawdowns to 41.0% versus SPY's 56.5%.
                    </p>
                    <p style={{fontFamily:WP.serif,fontSize:13,lineHeight:1.9,color:"#1a1a1a",margin:0}}>
                      The strategy's edge is structural. The four-regime MA framework, 7-DTE weekly calls
                      across 52 annual cycles, VIX-dynamic delta adjustment, and trend suppression prevent
                      call overwriting from capping returns in strong bull markets.
                      No directional forecasting is required.
                    </p>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginTop:16}}>
                      {[
                        {l:"From $3.2M",    v:"$112.7M",  s:"26-year final value",        c:WP.green},
                        {l:"vs. B&H",       v:"+$63.6M",  s:"incremental wealth",          c:WP.green},
                        {l:"Annual Alpha",  v:"+8.59%",    s:"annualized outperformance",   c:WP.gold},
                        {l:"Sharpe Ratio",  v:"0.516",     s:"vs. SPY 0.077",               c:WP.green},
                      ].map(({l,v,s,c})=>(
                        <div key={l} style={{background:"#fff",border:`1px solid ${WP.green}25`,
                          borderRadius:2,padding:"10px 12px"}}>
                          <div style={{fontSize:8,color:WP.faint,textTransform:"uppercase",
                            letterSpacing:0.5,marginBottom:3}}>{l}</div>
                          <div style={{fontFamily:WP.serif,fontSize:17,fontWeight:700,color:c,lineHeight:1}}>{v}</div>
                          <div style={{fontSize:9,color:WP.faint,marginTop:3}}>{s}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </WSection>

                {/* ── FOOTER ── */}
                <div style={{borderTop:`1px solid ${WP.border}`,paddingTop:14,
                  fontSize:9.5,color:WP.faint,lineHeight:1.8,fontFamily:WP.sans}}>
                  <div style={{fontFamily:WP.sans,fontSize:10,color:WP.muted,fontWeight:600,marginBottom:6}}>
                    &copy; {new Date().getFullYear()} Tenacity Investments, LLC. All rights reserved.
                    Confidential &mdash; not for redistribution without written consent.
                  </div>
                  <strong style={{color:WP.muted}}>Backtest Methodology:</strong> SPY daily OHLCV 2000–2026 (6,387 trading days).
                  VIX: CBOE closing values, 100% real data, no proxies. Options: Black-Scholes, IV = VIX/100 × 1.10.
                  Margin cost: 4.5%/yr daily accrual. Risk-free rate: 4.5%. No look-ahead bias: all regime signals use
                  prior-day close; all trades execute at next open. Transaction costs not explicitly modeled
                  (~0.1–0.2% estimated annual drag). Walk-forward validation pending.
                  &nbsp;·&nbsp;
                  <strong style={{color:WP.muted}}>Disclosure:</strong> This document does not constitute investment
                  or tax advice. The strategy involves margin and options which carry risks beyond a simple long-equity
                  position. Consult a qualified financial advisor and tax counsel before implementation.
                  Past performance does not guarantee future results.
                </div>

              </div>
            </div>
          );
        })()}

        {/* ══════════════════════ SETTINGS */}
        {tab==="settings"&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            <Card>
              <Lbl>FINNHUB API KEY</Lbl>
              <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:12}}>
                <div style={{padding:14,background:"#eef2f8",border:`1px solid ${C.border}`,borderRadius:8,fontSize:11,color:C.info,lineHeight:1.8}}>
                  <b>Free setup (2 minutes):</b><br/>
                  1. Go to <b>finnhub.io</b> and create a free account<br/>
                  2. Copy your API key from the dashboard<br/>
                  3. Paste it below — app auto-fetches on load &amp; every 5 min
                </div>
                <Inp label="API Key" value={apiKey} onChange={v=>setApiKey(v)} placeholder="your_finnhub_api_key" type="text" hint="Stored locally · never sent anywhere except finnhub.io"/>
                <button onClick={()=>fetchData(apiKey)} disabled={!apiKey||loading} style={{
                  background:!apiKey?C.bg:C.text,border:`1px solid ${!apiKey?C.border:C.text}`,
                  borderRadius:8,color:!apiKey?C.faint:"#fff",padding:"10px 20px",
                  fontFamily:F.mono,fontSize:11,cursor:!apiKey?"not-allowed":"pointer",letterSpacing:1}}>
                  {loading?"Fetching…":"TEST CONNECTION"}
                </button>
                {lastFetch&&<div style={{fontSize:11,color:C.apex}}>✓ Connected · Last fetch {lastFetch.toLocaleTimeString()}</div>}
                {fetchErr&&<div style={{fontSize:11,color:C.danger}}>✗ {fetchErr}</div>}
              </div>
            </Card>
            <Card>
              <Lbl>STRATEGY v2 PARAMETERS</Lbl>
              <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:4}}>
                {[
                  ["Manager",        "Tenacity Investments, LLC",C.apex],
                  ["Version",        "APEX v2 · Dynamic Δ + VIX adj",C.apex],
                  ["R0 Bear",        "0.50x · Δ0.15 base"],
                  ["R1 Weak",        "1.25x · Δ0.20 base"],
                  ["R2 Mixed",       "1.25x · Δ0.25 base"],
                  ["R3 Strong",      "1.75x · Δ0.30 base"],
                  ["VIX Adj",        "VIX<16 → +0.05Δ · VIX>25 → −0.05Δ"],
                  ["DTE",            "7 days (weekly Friday)"],
                  ["Early Roll",     "70% profit captured"],
                  ["Trend Suppress", ">0.7 → 25% OW · 0.5–0.7 → 50% OW"],
                  ["Blackout",       "3 days pre-FOMC + pre-CPI"],
                  ["Ann Return",     "15.05%",C.apex],
                  ["Sharpe",         "0.516", C.apex],
                  ["Max Drawdown",   "−41.0%",C.warn],
                  ["$3.2M → Final",  "$112.7M",C.apex],
                ].map(([l,v,c=C.text])=>(
                  <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"7px 12px",borderRadius:5,background:C.bg,border:`1px solid ${C.border}`}}>
                    <span style={{fontSize:10,color:C.muted}}>{l}</span>
                    <span style={{fontSize:10,fontWeight:600,color:c,fontFamily:F.mono}}>{v}</span>
                  </div>
                ))}
              </div>
            </Card>
          </div>
        )}

      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<APEXApp/>);
  </script>
</body>
</html>
